---
###############################################################################
# Playbook: deploy-app
#
# Deploys the 4 microservices on the EC2 host using docker-compose.aws.yml
# from the repo. Images are PULLED from Docker Hub — they are NOT built on
# the host. Run `make push` (or the per-service `mvn package + docker build
# + docker push` flow documented in the repo README) BEFORE this playbook.
#
# Inputs (all defaulted in group_vars/all.yml; override with -e if needed):
#   - sqs_product_events_url  (built from account_id + region + queue name)
#   - docker_hub_user         (default: dhirennn)
#   - image_tag               (default: latest)
#   - aws_region              (default: us-east-1)
#
# Run from the ansible/ directory:
#   ansible-playbook playbooks/deploy-app.yml
#
# Re-run is safe: it `docker compose pull` + `up -d` which is idempotent.
###############################################################################

- name: Deploy cncloud microservices stack
  hosts: env_dev
  gather_facts: true
  become: true

  pre_tasks:
    # The DB credentials live in AWS Secrets Manager (created by the Terraform
    # db module). We read them at deploy time and inject them into the .env
    # file consumed by docker-compose. We delegate this to localhost so it
    # uses the operator's AWS credentials, not the EC2's role — keeps the
    # EC2 from needing GetSecretValue on its own secret indirectly.
    - name: Read RDS credentials from Secrets Manager
      ansible.builtin.command:
        cmd: >-
          aws secretsmanager get-secret-value
          --secret-id {{ db_secret_name }}
          --region {{ aws_region }}
          --query SecretString --output text
      delegate_to: localhost
      become: false
      register: db_secret_raw
      changed_when: false
      # Retries because we sometimes see transient "Could not connect to the endpoint URL"
      # errors on macOS networks.
      retries: 3
      delay: 5
      until: db_secret_raw.rc == 0
      no_log: true

    - name: Parse the secret JSON
      ansible.builtin.set_fact:
        db_creds: "{{ db_secret_raw.stdout | from_json }}"
      no_log: true

    - name: Sanity-check that the secret has the keys we need
      ansible.builtin.assert:
        that:
          - "'host' in db_creds"
          - "'port' in db_creds"
          - "'username' in db_creds"
          - "'password' in db_creds"
          - "'dbname' in db_creds"
        fail_msg: "DB secret is missing required keys. Check the db module outputs."

    - name: Ensure Docker is up and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    # t3.micro has only 1 GB of RAM. Running 4 Spring Boot apps without swap
    # is at the edge of OOM. We carve out 2 GB of swap on disk; cheap and
    # effectively stops the OOM-killer during JVM warmup.
    - name: Check existing swap
      ansible.builtin.command: swapon --show
      register: swap_status
      changed_when: false

    - name: Swap setup (only when /swapfile is not already active)
      when: "'/swapfile' not in swap_status.stdout"
      block:
        - name: Create 2 GB swap file
          ansible.builtin.command: fallocate -l 2G /swapfile
          args:
            creates: /swapfile

        - name: Lock down swap file permissions
          ansible.builtin.file:
            path: /swapfile
            owner: root
            group: root
            mode: "0600"

        - name: Initialize swap
          ansible.builtin.command: mkswap /swapfile

        - name: Activate swap
          ansible.builtin.command: swapon /swapfile

    - name: Persist swap across reboots (fstab)
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Ensure app directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

  tasks:
    - name: Render docker-compose.yml on the host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker-compose.aws.yml"
        dest: "{{ compose_file }}"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Write the .env file (env vars consumed by docker-compose)
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: ec2-user
        group: ec2-user
        mode: "0600" # contains the DB password — owner read only
        content: |
          # Generated by ansible/playbooks/deploy-app.yml - do not edit by hand
          DOCKER_HUB_USER={{ docker_hub_user }}
          IMAGE_TAG={{ image_tag }}
          AWS_REGION={{ aws_region }}
          CNCLOUD_SQS_PRODUCT_EVENTS_URL={{ sqs_product_events_url }}
          DB_HOST={{ db_creds.host }}
          DB_PORT={{ db_creds.port }}
          DB_NAME={{ db_creds.dbname }}
          DB_USERNAME={{ db_creds.username }}
          DB_PASSWORD={{ db_creds.password }}
      no_log: true

    - name: Pull the latest container images from Docker Hub
      ansible.builtin.command:
        cmd: docker compose --env-file .env -f {{ compose_file | basename }} pull
        chdir: "{{ app_dir }}"
      register: compose_pull
      changed_when: "'Pulled' in compose_pull.stdout or 'Downloaded' in compose_pull.stdout"

    - name: Bring up the stack (force recreate to pick up new images)
      ansible.builtin.command:
        cmd: docker compose --env-file .env -f {{ compose_file | basename }} up -d --remove-orphans --force-recreate
        chdir: "{{ app_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr or 'Recreated' in compose_up.stderr"

    - name: Wait for api-gateway healthcheck to be ready
      ansible.builtin.uri:
        url: "http://localhost:8080/actuator/health"
        return_content: false
        status_code: 200
      register: gw_health
      retries: 24
      delay: 5
      until: gw_health.status == 200
      ignore_errors: true # don't fail the play on first deploy — surface as debug

    - name: Show api-gateway health status
      ansible.builtin.debug:
        msg: >-
          api-gateway on {{ inventory_hostname }} returned
          HTTP {{ gw_health.status | default('?') }}
          ({{ 'OK' if gw_health.status == 200 else 'NOT READY YET' }})

    - name: List running containers
      ansible.builtin.command: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Show running containers
      ansible.builtin.debug:
        var: docker_ps.stdout_lines
