###############################################################################
# AWS profile for user-service.
#
# No SQS, no Kafka. H2 kept until task #9 (RDS migration).
# This file exists so that SPRING_PROFILES_ACTIVE=aws works uniformly across
# all 4 services even though user-service has no AWS-specific configuration.
###############################################################################

spring:
  application:
    name: user-service

  # ---- Persistence: RDS Postgres, schema 'user_svc' ---------------------- #
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:appdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: user_svc
        hbm2ddl:
          create_namespaces: true
        format_sql: false
    show-sql: false
